<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula Library</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="glass-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-inner">
                <div class="brand">
                    <h1 data-tooltip="Version 1.0">Formulae</h1>
                    <p>Repository</p>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search formulas...">
                </div>

                <div class="unit-section">
                    <h3>Units</h3>
                    <ul id="unit-list" class="unit-list">
                        <!-- Injected by app.js -->
                    </ul>
                    <button id="btn-add-unit" class="btn-secondary">New Unit</button>
                </div>

                <div class="sidebar-footer">
                    <button id="btn-export" class="btn-secondary">Export JSON</button>
                    <label for="file-import" class="btn-secondary">Import JSON</label>
                    <input type="file" id="file-import" style="display:none" accept=".json">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header>
                <button id="btn-fullscreen" class="btn-hamburger" title="Toggle Sidebar">&#9776;</button>
                <button id="btn-add-entry" class="btn-primary">New Entry</button>
            </header>

            <div id="main-content" class="entry-grid">
                <!-- Entries injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Edit/New Modal -->
    <div id="entry-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3>Edit Entry</h3>
                <button id="btn-cancel-entry" class="btn-close">&times;</button>
            </div>
            <div class="modal-body split-pane">
                <div class="editor-pane">
                    <input type="text" id="modal-title-input" placeholder="Title">

                    <textarea id="modal-raw-input" placeholder="Enter LaTeX code..."></textarea>
                </div>
                <div class="preview-pane">
                    <div id="modal-preview-area" class="preview-stage">
                        Preview...
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-save-entry" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Full Screen View Modal -->
    <div id="view-modal" class="modal-overlay">
        <div class="modal-content glass-panel" style="width:95vw; height:95vh;">
            <div class="modal-header">
                <h3 id="view-modal-title">Title</h3>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="zoom-controls">
                        <button id="btn-zoom-out" class="btn-secondary" title="Zoom Out">&minus;</button>
                        <button id="btn-zoom-in" class="btn-secondary" title="Zoom In">&plus;</button>
                    </div>
                    <button id="btn-edit-view" class="btn-secondary">Edit</button>
                    <button id="btn-close-view" class="btn-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="view-modal-content">
                    <!-- Content Rendered Here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden PDF Upload Input -->
    <input type="file" id="pdf-upload-input" style="display:none" accept=".pdf">

    <!-- PDF Viewer Modal -->
    <div id="pdf-viewer-modal" class="modal-overlay">
        <div class="modal-content glass-panel" style="width:95vw; height:95vh;">
            <div class="modal-header">
                <h3 id="pdf-viewer-title">PDF</h3>
                <button id="btn-close-pdf-viewer" class="btn-close">&times;</button>
            </div>
            <div class="modal-body" style="padding:0; flex:1; overflow:hidden;">
                <iframe id="pdf-viewer-iframe" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <!-- Scripts (Order Matters) -->
    <script src="static/js/renderer.js"></script>
    <script src="static/js/library.js"></script>
    <script src="static/js/pdf-store.js"></script>
    <script src="static/js/app.js"></script>
</body>

</html>
